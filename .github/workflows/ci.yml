name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Stub values so Next.js can resolve env-dependent imports at build time.
      # Real secrets are never stored in CI — they live in Vercel environment variables.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: https://verifydummytickets.com
      CAPTCHA_SECRET: ci-placeholder-captcha-secret-minimum-32-chars
      INTERNAL_API_SECRET: ci-placeholder-internal-secret-minimum-32-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
